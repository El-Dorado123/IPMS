<p-menubar [model]="items" class="app-menubar">
  <ng-template pTemplate="start">
    <button class="brand-mark" type="button" aria-label="PGOFY Dashboard" (click)="goToHome()">
      @if(themeService.isDark()){
      <img src="pagofy-logo-dark.png" alt="PAGOFY" class="logo !h-[2.7rem] pt-1 logo-dark" />
      }@else{
      <img src="pagofy-logo.png" alt="PAGOFY" class="logo w-full logo-light" />
      }
    </button>
  </ng-template>

  <ng-template pTemplate="end">
    <div class="menubar-end desktop-only">
      <button class="topbar-icon-button" type="button" aria-label="Change language" (click)="goToLanguage()">
        <i class="pi pi-language" aria-hidden="true"></i>
      </button>
      <button class="topbar-icon-button" type="button" aria-label="Toggle theme" (click)="toggleTheme()">
        <i class="pi" [ngClass]="themeIcon()" aria-hidden="true"></i>
      </button>
      <button class="topbar-icon-button" type="button" aria-label="Theme menu" (click)="goToThemeSettings()">
        <i class="pi pi-palette" aria-hidden="true"></i>
      </button>
      <i class="pi pi-bell cursor-pointer theme-icon" aria-label="Notifications" (click)="goToNotifications()"></i>
      <i class="pi pi-user cursor-pointer theme-icon" aria-label="Profile" (click)="showProfileDrawer()"></i>
    </div>
  </ng-template>
</p-menubar>

<p-drawer [(visible)]="showProfile" position="right" styleClass="profile-drawer" [modal]="true" [showCloseIcon]="true">
  <div class="profile-panel">
    <div class="profile-summary">
      <p-avatar [image]="profileDetails().profile_url || ''"
        [label]="profileDetails().profile_url ? undefined : profileDetails().name.charAt(0)" size="xlarge"
        shape="circle" styleClass="profile-avatar"></p-avatar>

      <div class="profile-copy">
        <div class="profile-name">{{ profileDetails().name | uppercase }}</div>
        <div class="profile-plan">{{ profileDetails().plan_name }}</div>
      </div>
    </div>

    <p-divider></p-divider>

    <div class="profile-menu">
      @for (item of profileMenuItems; track item.route) {
      <button class="profile-menu-item" type="button" (click)="onProfileMenuClick(item)" pRipple>
        @if (item.icon) {
        <i [class]="item.icon" aria-hidden="true"></i>
        }
        <span>{{ item.label }}</span>
      </button>
      }
    </div>

    <p-divider></p-divider>

    <button class="profile-menu-item sign-out" type="button" (click)="signOut()" pRipple>
      <i class="pi pi-sign-out" aria-hidden="true"></i>
      <span>Sign Out</span>
    </button>
  </div>
</p-drawer>

<footer class="topbar-footer">
  <div class="footer-content">
    <span>&copy; {{ currentYear }} | IPMS. All rights reserved.</span>
    <span class="footer-separator">|</span>
    <button type="button" class="release-button" (click)="goToReleaseNotes()">What's New</button>
  </div>
</footer>
