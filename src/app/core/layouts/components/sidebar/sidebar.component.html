<aside class="sidebar" [ngClass]="{ 'is-collapsed': collapsed() }">
  <a class="brand" routerLink="/app/dashboard" aria-label="IPMS Dashboard">
    <span class="brand-mark">I</span>
    <span class="brand-name">IPMS</span>
  </a>

  <nav class="menu" aria-label="Main menu">
    @for (item of items(); track item.route) {
      <section class="menu-group">
        <a class="menu-item" [routerLink]="item.route" routerLinkActive="is-active">
          @if (item.icon) {
            <i [class]="item.icon" aria-hidden="true"></i>
          }
          <span>{{ item.label }}</span>
        </a>

        @if (item.children?.length) {
          <div class="submenu">
            @for (child of item.children; track child.route) {
              <a class="submenu-item" [routerLink]="child.route" routerLinkActive="is-active">
                {{ child.label }}
              </a>
            }
          </div>
        }
      </section>
    }
  </nav>
</aside>
